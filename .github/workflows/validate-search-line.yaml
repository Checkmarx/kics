name: validate-search-line

on:
  pull_request:
    branches: [master]
    paths:
      - "assets/queries/**/query.rego"

jobs:
  validate-search-line:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9e0d6c9823c012979046888a936bb523 # v5.0.0
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@0a12ed9d6470c34f1fac053dbb1c47566dae491f # v5.0.0
        with:
          go-version: "1.21"
          cache: true

      - name: Build KICS
        run: |
          make build
        working-directory: .

      - name: Run searchLine validation script
        env:
          KICS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KICS_PR_NUMBER: ${{ github.event.number }}
        id: validator
        working-directory: .github/scripts/validate-search-line/
        run: |
          pip3 install -r requirements.txt
          python3 validate-search-line.py
