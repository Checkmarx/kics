---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: label-mismatch
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-store
  template:
    metadata:
      labels:
        app: web-shore
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: web-store
            topologyKey: kubernetes.io/hostname
      containers:
      - image: nginx:1.16-alpine
        name: web-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-affinity
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-store
  template:
    metadata:
      labels:
        app: web-store
    spec:
      containers:
      - image: nginx:1.16-alpine
        name: web-app
